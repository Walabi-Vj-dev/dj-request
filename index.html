<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DJ Request 🎵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#ff2d9b;--cyan:#00f5ff;--yellow:#ffe600;
  --dark:#06040f;--dark2:#0e0820;--dark3:#1a1030;
  --card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.09);
}
html,body{min-height:100vh;background:var(--dark);font-family:'Outfit',sans-serif;color:#fff;overflow-x:hidden}
body{padding-bottom:40px}

/* animated bg */
.bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,45,155,0.18),transparent),
             radial-gradient(ellipse 60% 40% at 100% 80%,rgba(0,245,255,0.12),transparent);
}
.grid-lines{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,245,255,0.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,245,255,0.025) 1px,transparent 1px);
  background-size:36px 36px;
}

.wrap{max-width:420px;margin:0 auto;padding:0 18px;position:relative;z-index:1}

/* header */
.hero{text-align:center;padding:36px 0 28px}
.dj-name{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:0.05em;
  background:linear-gradient(135deg,var(--pink) 0%,var(--cyan) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;text-shadow:none}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.38);letter-spacing:0.1em;margin-top:6px;text-transform:uppercase}
.pulse-bar{display:flex;justify-content:center;gap:4px;margin-top:16px;align-items:flex-end;height:20px}
.pulse-bar span{width:3px;border-radius:3px;background:var(--pink);animation:pulse 1.1s ease-in-out infinite}
.pulse-bar span:nth-child(2){background:var(--cyan);animation-delay:.15s;height:70%}
.pulse-bar span:nth-child(3){animation-delay:.3s}
.pulse-bar span:nth-child(4){background:var(--cyan);animation-delay:.45s;height:55%}
.pulse-bar span:nth-child(5){animation-delay:.6s;height:80%}
@keyframes pulse{0%,100%{height:8px}50%{height:20px}}

/* form blocks */
.block{margin-bottom:18px}
.block-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:rgba(255,255,255,0.35);margin-bottom:10px;display:block}

.txt-input{width:100%;padding:13px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;outline:none;
  transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.txt-input::placeholder{color:rgba(255,255,255,0.2)}
.txt-input:focus{border-color:rgba(0,245,255,0.5);box-shadow:0 0 0 3px rgba(0,245,255,0.08)}

/* genres */
.genres{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.g-btn{padding:11px 6px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:rgba(255,255,255,0.45);font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;
  -webkit-tap-highlight-color:transparent;user-select:none}
.g-btn:active{transform:scale(0.95)}
.g-btn.sel{box-shadow:0 0 16px -2px var(--gc,#ff2d9b);}

/* submit */
.submit-btn{width:100%;padding:16px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--pink),#9b1dea);
  color:#fff;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:0.06em;cursor:pointer;transition:all .25s;
  box-shadow:0 6px 28px rgba(255,45,155,0.4);margin-top:8px;
  -webkit-tap-highlight-color:transparent}
.submit-btn:active{transform:scale(0.97)}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}

/* toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(0,245,255,0.12);border:1px solid rgba(0,245,255,0.3);
  backdrop-filter:blur(12px);border-radius:14px;padding:14px 24px;
  font-size:14px;font-weight:600;color:var(--cyan);white-space:nowrap;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:100}
.toast.show{transform:translateX(-50%) translateY(0)}

/* connecting */
.status-dot{width:8px;height:8px;border-radius:50%;background:#444;display:inline-block;margin-right:6px;transition:background .3s}
.status-dot.ok{background:#22c55e;box-shadow:0 0 6px #22c55e}
.status-dot.err{background:#ef4444}
.status-bar{text-align:center;font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:20px}

.char-count{text-align:right;font-size:11px;color:rgba(255,255,255,0.2);margin-top:4px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid-lines"></div>

<div class="wrap">
  <div class="hero">
    <div style="font-size:11px;letter-spacing:0.2em;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:4px">🎧 DJ Set</div><div class="dj-name">Fabio &amp; Eric</div>
    <div class="hero-sub">Pedí tu tema — aparece en pantalla</div>
    <div class="pulse-bar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="status-bar">
    <span class="status-dot" id="dot"></span>
    <span id="status-txt">Conectando...</span>
  </div>

  <div class="block">
    <label class="block-label">Tu nombre (opcional)</label>
    <input class="txt-input" id="iname" type="text" placeholder="¿Cómo te llaman?" maxlength="30" autocomplete="off">
    <div class="char-count"><span id="nc">0</span>/30</div>
  </div>

  <div class="block">
    <label class="block-label">¿Qué estilo querés escuchar?</label>
    <div class="genres" id="genres"></div>
  </div>

  <div class="block">
    <label class="block-label">Tema o artista (opcional)</label>
    <input class="txt-input" id="isong" type="text" placeholder="Ej: Bad Bunny, La Macarena..." maxlength="60" autocomplete="off">
    <div class="char-count"><span id="sc">0</span>/60</div>
  </div>

  <button class="submit-btn" id="btn" onclick="submit()">🎤 Mandar pedido</button>
</div>

<div class="toast" id="toast">✅ ¡Pedido enviado! El DJ lo tiene.</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ══════════════════════════════════════════
//  REEMPLAZÁ ESTOS VALORES con los de tu
//  proyecto Firebase (ver README.md)
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyBw0CqhfhOvgslp2n6gBuxOPxq_uA2hZHk",
  authDomain: "pedi-tu-tema-al-dj.firebaseapp.com",
  databaseURL: "https://pedi-tu-tema-al-dj-default-rtdb.firebaseio.com",
  projectId: "pedi-tu-tema-al-dj",
  storageBucket: "pedi-tu-tema-al-dj.firebasestorage.app",
  messagingSenderId: "191645194240",
  appId: "1:191645194240:web:541c2574d3ab80f1c660e5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._db = db;
window._ref = ref;
window._push = push;
window._ts = serverTimestamp;

document.getElementById('dot').classList.add('ok');
document.getElementById('status-txt').textContent = 'Conectado ✓';

const GENRES = [
  {e:'🔥',l:'Reggaetón',c:'#ff2d9b'},
  {e:'🎶',l:'Cumbia',c:'#ffe600'},
  {e:'⚡',l:'Electrónica',c:'#00f5ff'},
  {e:'🎸',l:'Rock',c:'#ff6b35'},
  {e:'💃',l:'Salsa',c:'#a855f7'},
  {e:'🕺',l:'80s',c:'#3b82f6'},
  {e:'🤠',l:'Cuarteto',c:'#22c55e'},
  {e:'🎸',l:'Nacionales',c:'#f472b6'},
  {e:'💿',l:'90s',c:'#fb923c'},
];

let sel = null;
const grid = document.getElementById('genres');
GENRES.forEach((g,i)=>{
  const b = document.createElement('button');
  b.className='g-btn'; b.textContent=g.e+' '+g.l;
  b.onclick=()=>{
    sel = sel===i?null:i;
    document.querySelectorAll('.g-btn').forEach((x,j)=>{
      if(j===sel){x.classList.add('sel');x.style.cssText=`border-color:${GENRES[j].c};color:${GENRES[j].c};background:${GENRES[j].c}18;--gc:${GENRES[j].c}`}
      else{x.classList.remove('sel');x.style.cssText=''}
    });
  };
  grid.appendChild(b);
});

document.getElementById('iname').addEventListener('input',e=>document.getElementById('nc').textContent=e.target.value.length);
document.getElementById('isong').addEventListener('input',e=>document.getElementById('sc').textContent=e.target.value.length);

window.submit = async function(){
  const name = document.getElementById('iname').value.trim()||'Anónimo';
  const song = document.getElementById('isong').value.trim();
  const genre = sel!==null ? GENRES[sel] : null;
  if(!genre && !song){alert('Elegí un estilo o escribí un tema 🎵');return;}
  const btn = document.getElementById('btn');
  btn.disabled=true; btn.textContent='Enviando...';
  try{
    await window._push(window._ref(window._db,'requests'),{
      name, song:song||null,
      genre:genre?.l||null, genreEmoji:genre?.e||null, genreColor:genre?.c||'#888',
      ts:window._ts(), done:false
    });
    document.getElementById('iname').value='';
    document.getElementById('isong').value='';
    document.getElementById('nc').textContent='0';
    document.getElementById('sc').textContent='0';
    sel=null; document.querySelectorAll('.g-btn').forEach(x=>{x.classList.remove('sel');x.style.cssText=''});
    const t=document.getElementById('toast'); t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),3000);
  }catch(e){console.error(e);alert('Error: ' + e.message);}
  btn.disabled=false; btn.textContent='🎤 Mandar pedido';
};
</script>
</body>
</html>
